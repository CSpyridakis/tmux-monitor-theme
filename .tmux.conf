#!/usr/bin/tmux


# ---------------------------------------------------------------------------------------
# Change Prefix key
# ---------------------------------------------------------------------------------------
# set -g prefix C-a
# bind C-a send-prefix
# unbind C-b

# ---------------------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------------------
set -g mouse on
set -g default-terminal "screen-256color"
set -g base-index 1                 # Pane numbering from 1
set -g allow-rename off             # Disable autorenaming when you give a specific name to a pane
set-option -g renumber-windows on   # When delete a window, will renumber the rest

bind r source-file ~/.tmux.conf \; display-message " Config successfully reloaded!"     # Reload conf

# ---------------------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------------------
non_active_pane_bg_clr="colour234"   # original dim bg, dimmer than status bg
non_active_font_clr="colour244"      # muted mid-gray text on inactive pane
non_active_border_fg_clr="colour238" # visible gray border
active_border_fg_clr="colour39"      # crisp electric blue accent for active border
active_pane_bg_clr="colour235"       # matches status bar bg
active_pane_fg_clr="colour231"       # pure white text on active pane

# Accents / messages / clock / pane title
accent_clr="colour39"                # crisp electric blue accent (shared)
accent_font_clr="colour232"          # near-black text on accent
clock_clr="colour39"                 # clock digits color
message_bg_clr="colour39"            # notification bar bg
message_fg_clr="colour232"           # notification bar fg
command_bg_clr="colour235"           # command prompt (:) bg
command_fg_clr="colour231"           # command prompt (:) input — pure white
pane_title_fg_clr="colour220"        # sharp gold pane title text

# ---------------------------------------------------------------------------------------
# Panes
# ---------------------------------------------------------------------------------------

# Split Panes
bind % split-window -h \; select-pane -T ''      # Split pane horizontally (default)
bind | split-window -h \; select-pane -T ''      # Split pane horizontally

bind '"' split-window -v \; select-pane -T ''    # Split pane vertically (default)
bind - split-window -v \; select-pane -T ''      # Split pane vertically

# Pane borders
# set -g pane-border-status bottom
# set -g pane-border-format "#[bold,fg=#dddddd,bg=#009aff]#T"
set -g pane-border-format "#[bold,fg=$pane_title_fg_clr]#T"

# Pane Navigation: use <Alt> + arrow keys to move to panes
bind -n M-Left  select-pane -L                                                      # Focus left pane
bind -n M-Right select-pane -R                                                      # Focus right pane
bind -n M-Up    select-pane -U                                                      # Focus upper pane
bind -n M-Down  select-pane -D                                                      # Focus lower pane

# Move panes
bind j command-prompt -p "Join pane from window:" "join-pane -s '%%'"               # Pull pane here
bind s command-prompt -p "Send pane to window:"   "join-pane -t '%%'"               # Push pane out
bind b command-prompt -p "Swap pane with:" "swap-pane -s '${PANE_NUM}' -t '%%'"     # Swap two panes

# Pane names
bind / command-prompt -p "(rename-pane)" -I "#T" "select-pane -T '%%'"              # Rename pane
bind u set pane-border-status                                                       # Make names visible
bind U set pane-border-status off                                                   # Make names invisible

# Sync panes
bind y set-window-option synchronize-panes\; display-message " Pane sync #{?pane_synchronized,ON,OFF}"  # Toggle pane sync

# ---------------------------------------------------------------------------------------
# Clock
# ---------------------------------------------------------------------------------------
set-window-option -g clock-mode-colour "$clock_clr"
set-window-option -g clock-mode-style 12

# ---------------------------------------------------------------------------------------
# Windows
# ---------------------------------------------------------------------------------------
unbind C-c                                       # Free C-c
bind c new-window \; select-pane -T ''           # New window (default)
# Move around windows
bind-key -n C-S-Left  select-window -t -1        # Prev window
bind-key -n C-S-Right select-window -t +1        # Next window

# Reorder windows
bind-key -n C-S-Up   swap-window -t -1\; select-window -t -1    # Move window left
bind-key -n C-S-Down swap-window -t +1\; select-window -t +1    # Move window right

set -g status-justify 'centre'

set -g window-status-separator ''

setw -g window-status-format "#($HOME/.tmux-functions.sh -m)"
setw -g window-status-current-format "#($HOME/.tmux-functions.sh -M)"

bind-key c new-window -n 'new' # When create a new window set window name as empty

# ---------------------------------------------------------------------------------------
# Coloring Panes and Borders (modernized 256-color, close to original)
# ---------------------------------------------------------------------------------------

set -g pane-border-style "bg=$non_active_pane_bg_clr fg=$non_active_border_fg_clr"   # Non active border
set -g pane-active-border-style "bg=$active_pane_bg_clr fg=$active_border_fg_clr"    # Active border
set -g window-style "bg=$non_active_pane_bg_clr fg=$non_active_font_clr"             # Non active pane
set -g window-active-style "bg=$active_pane_bg_clr fg=$active_pane_fg_clr"           # Active pane
# ---------------------------------------------------------------------------------------

# Clipboard
# ---------------------------------------------------------------------------------------
# Linux uses xclip; macOS uses pbcopy. if-shell picks at config load.
set-window-option -g mode-keys vi

if-shell "uname | grep -q Darwin" \
    'bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy" ; \
     bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy" ; \
     bind -T copy-mode-vi C-j send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard" ; \
     bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard" ; \
     bind -T copy-mode-vi C-j send-keys -X copy-pipe-and-cancel "xclip -i -f -selection clipboard"'

# ---------------------------------------------------------------------------------------
# messages
# ---------------------------------------------------------------------------------------
set -g message-style "fg=$message_fg_clr bg=$message_bg_clr bold"
set -g message-command-style "fg=$command_fg_clr bg=$command_bg_clr bold"


# ---------------------------------------------------------------------------------------
# Status Bar
# ---------------------------------------------------------------------------------------
set -g status 'on'
set -g status-interval 1
set -g status-position bottom

set -g status-style "fg=$active_pane_fg_clr,bg=$active_pane_bg_clr"

set -g status-left-length '50'
set -g status-right-length '50'

set -g status-left "#($HOME/.tmux-functions.sh -l)"
set -g status-right "#($HOME/.tmux-functions.sh -r)"
